<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>旅遊天氣 - 行程檢視（自適應表格/卡片）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: system-ui, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            padding: 24px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 36px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header-left { text-align: left; }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #1e3c72, #2b4c7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .project-badge {
            background: rgba(255,255,240,0.9);
            border-radius: 60px;
            padding: 8px 20px;
            display: inline-block;
            margin-top: 12px;
            font-weight: 500;
        }
        .about-btn {
            background: white;
            border: none;
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-size: 1rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .about-btn:hover { background: #2a5591; color: white; }

        /* ----- 載入進度條 ----- */
        .loading-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .progress-bar-bg {
            flex: 1;
            min-width: 150px;
            height: 8px;
            background: #e0e7f5;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #2a5591, #4a8bc2);
            border-radius: 10px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-text {
            font-size: 0.85rem;
            color: #2c3e66;
            font-weight: 500;
            white-space: nowrap;
        }

        /* ----- 卡片樣式 (手機版使用) ----- */
        .weather-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
        }
        .weather-card {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 42px;
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.4s ease;
        }
        .weather-card.loading-card {
            opacity: 0.7;
            animation: pulse 1.5s infinite;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.9; }
        }
        .card-header { padding: 18px 20px 8px; border-bottom: 1px solid #eef2fa; }
        .location-name { font-size: 1.5rem; font-weight: 700; color: #1f3b64; }
        .date-range { font-size: 0.8rem; color: #4a627a; margin-top: 6px; }
        .weather-content { padding: 16px 20px 20px; flex: 1; }
        .daily-forecast {
            margin-top: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .daily-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #d9e2f0;
            flex-wrap: wrap;
            gap: 4px;
        }
        .daily-item:last-child { border-bottom: none; }
        .daily-date { font-size: 0.9rem; font-weight: 500; color: #2c3e66; min-width: 70px; }
        .daily-icon { font-size: 1.5rem; margin: 0 8px; }
        .daily-temp { display: flex; gap: 8px; }
        .daily-high { color: #c23b22; font-weight: 600; }
        .daily-low { color: #2c6e9e; }
        .daily-desc { font-size: 0.8rem; color: #5b7aa2; max-width: 90px; text-align: right; }
        .daily-outfit {
            font-size: 0.75rem;
            color: #6b5b8a;
            background: #f0ebf8;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            white-space: nowrap;
        }
        .summary-temp {
            display: flex;
            justify-content: space-around;
            background: #eef2fc;
            border-radius: 30px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .badge-note {
            background: #fff3cf;
            color: #b16e1a;
            font-size: 0.7rem;
            padding: 6px;
            border-radius: 30px;
            text-align: center;
            margin-top: 12px;
        }
        .error-card { background: #ffe0e0; }
        
        /* 骨架屏載入動畫 */
        .skeleton {
            background: linear-gradient(90deg, #e8ecf5 25%, #f0f3fa 50%, #e8ecf5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-line {
            height: 16px;
            margin: 8px 0;
        }
        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }

        /* ----- 表格容器與滾動箭頭樣式 ----- */
        .table-scroll-container {
            position: relative;
            display: flex;
            align-items: stretch;
            gap: 0;
        }
        
        .scroll-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            min-width: 44px;
            background: rgba(255,255,255,0.85);
            border: none;
            cursor: pointer;
            font-size: 1.8rem;
            color: #2a5591;
            transition: all 0.2s;
            z-index: 10;
            backdrop-filter: blur(2px);
            user-select: none;
            -webkit-user-select: none;
        }
        
        .scroll-arrow-left {
            border-radius: 24px 0 0 24px;
        }
        
        .scroll-arrow-right {
            border-radius: 0 24px 24px 0;
        }
        
        .scroll-arrow:hover {
            background: #2a5591;
            color: white;
        }
        
        .scroll-arrow:active {
            transform: scale(0.95);
        }
        
        .scroll-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .scroll-arrow:disabled:hover {
            background: rgba(255,255,255,0.85);
            color: #2a5591;
        }

        /* ----- 表格樣式 (桌面版使用) ----- */
        .table-wrapper {
            flex: 1;
            overflow-x: auto;
            border-radius: 24px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(2px);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.15);
            padding: 4px;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .table-wrapper::-webkit-scrollbar {
            display: none;
        }
        
        .weather-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.85);
            border-radius: 20px;
        }
        .weather-table th,
        .weather-table td {
            padding: 12px 8px;
            border: 1px solid #cbd6e8;
            text-align: center;
            vertical-align: middle;
        }
        .weather-table th {
            background: #2a5591;
            color: white;
            font-weight: 600;
            white-space: nowrap;
        }
        .weather-table td:first-child {
            background: #edf3fc;
            font-weight: 600;
            text-align: left;
            white-space: nowrap;
            position: sticky;
            left: 0;
            background-color: #eef2fc;
            box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1);
        }
        .weather-table th:first-child {
            position: sticky;
            left: 0;
            background-color: #1e3c72;
            z-index: 2;
        }
        .location-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .trip-meta {
            font-size: 0.7rem;
            color: #4a627a;
            margin-top: 4px;
            white-space: normal;
            word-break: break-word;
        }
        .avg-temp {
            font-size: 0.75rem;
            background: #d9e6f5;
            padding: 2px 8px;
            border-radius: 30px;
            margin-top: 6px;
            display: inline-block;
        }
        .cell-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 70px;
        }
        .cell-icon { font-size: 1.6rem; line-height: 1.2; }
        .cell-temp { font-weight: 600; display: flex; gap: 6px; justify-content: center; }
        .high { color: #c23b22; }
        .low { color: #2c6e9e; }
        .cell-desc { font-size: 0.7rem; color: #4f6f8f; white-space: nowrap; }
        .cell-outfit {
            font-size: 0.85rem;
            color: #6b5b8a;
            background: #f0ebf8;
            padding: 3px 6px;
            border-radius: 10px;
            margin-top: 3px;
            white-space: nowrap;
        }
        .mock-badge {
            background: #fff3cf;
            color: #b16e1a;
            font-size: 0.65rem;
            padding: 2px 4px;
            border-radius: 12px;
            margin-top: 2px;
        }
        .info-note {
            margin: 16px 0 8px;
            padding: 8px 16px;
            background: #fef7e0;
            border-radius: 40px;
            display: inline-block;
            font-size: 0.85rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.5);
            border-radius: 40px;
            color: #2c3e66;
        }
        
        /* 表格行載入動畫 */
        .weather-table tbody tr.loading-row td {
            background: linear-gradient(90deg, #f0f3f8 25%, #f8f9fc 50%, #f0f3f8 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        /* 彈窗 */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            border-radius: 48px;
            padding: 2rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-card h3 { font-size: 1.8rem; margin-bottom: 20px; color: #1e3c72; }
        .modal-info {
            background: #f4f8fe;
            border-radius: 28px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .modal-info p { margin: 8px 0; font-size: 1rem; }
        .logo-row { display: flex; justify-content: center; gap: 30px; margin: 20px 0 10px; }
        .logo-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .logo-icon {
            width: 48px; height: 48px;
            background: #2a5591;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .close-btn {
            background: #2a5591;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 16px;
        }
        .hidden { display: none; }

        /* 手機隱藏標題按鈕 */
        @media (max-width: 600px) {
            .header h1, .project-badge, .about-btn { display: none !important; }
            .header { margin-bottom: 16px; }
            body { padding-top: 12px; }
        }

        /* 平板以下也隱藏箭頭，保留原生滾動 */
        @media (max-width: 768px) {
            .scroll-arrow { display: none !important; }
            .table-wrapper {
                border-radius: 24px;
                -ms-overflow-style: auto;
                scrollbar-width: auto;
            }
            .table-wrapper::-webkit-scrollbar {
                display: block;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <h1>☀️ 旅遊天氣預報 · 智慧檢視</h1>
            <div id="projectTitleArea" class="project-badge">載入專案中...</div>
        </div>
        <button class="about-btn" id="aboutBtn">ℹ️ 關於</button>
    </div>

    <!-- 載入進度條 -->
    <div id="loadingProgress" class="loading-progress hidden">
        <span>⏳</span>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText">載入中...</span>
    </div>

    <div id="weatherGrid" class="weather-grid">⏳ 讀取行程並同步氣象資料...</div>
    <div class="footer"></div>
</div>

<!-- 關於彈窗 -->
<div id="aboutModal" class="modal hidden">
    <div class="modal-card">
        <h3>📋 關於本服務</h3>
        <div class="modal-info">
            <p><strong>版本：</strong>20260414.responsive</p>
            <p><strong>構想：</strong>Jumper.hsu@gmail.com</p>
            <p><strong>設計：</strong>DeepSeek</p>
            <p><strong>資料庫：</strong>Firebase</p>
        </div>
        <div class="logo-row">
            <div class="logo-item">
                <div class="logo-icon" style="background: #1e3c72;">🧠</div>
                <span>DeepSeek</span>
            </div>
            <div class="logo-item">
                <div class="logo-icon" style="background: #FFA000;">🔥</div>
                <span>Firebase</span>
            </div>
        </div>
        <button class="close-btn" id="closeAboutModal">關閉</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYMkPqucjxWd77bnJThzp1zp3m6fG-WMk",
        authDomain: "travelweather-9a073.firebaseapp.com",
        projectId: "travelweather-9a073",
        storageBucket: "travelweather-9a073.firebasestorage.app",
        messagingSenderId: "748531299215",
        appId: "1:748531299215:web:371a664b6d1f9ecc9a11fa",
        databaseURL: "https://travelweather-9a073-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const PROJECTS_PATH = "projects";

    // 內建座標庫
    const locationCoordinates = {
        "七寶古鎮": { lat: 31.1570, lon: 121.3487 },
        "上海七寶古鎮": { lat: 31.1570, lon: 121.3487 },
        "七宝古镇": { lat: 31.1570, lon: 121.3487 },
        "瀋陽中街": { lat: 41.8052, lon: 123.4631 },
        "沈阳中街": { lat: 41.8052, lon: 123.4631 },
        "中街": { lat: 41.8052, lon: 123.4631 },
        "哈爾濱中央大街": { lat: 45.7756, lon: 126.6237 },
        "哈尔滨中央大街": { lat: 45.7756, lon: 126.6237 },
        "中央大街": { lat: 45.7756, lon: 126.6237 },
        "寧波南塘老街": { lat: 29.8648, lon: 121.5439 },
        "宁波南塘老街": { lat: 29.8648, lon: 121.5439 },
        "南塘老街": { lat: 29.8648, lon: 121.5439 },
        "寧波南塘古鎮": { lat: 29.8648, lon: 121.5439 }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const guid = urlParams.get('guid');

    // 儲存資料供 resize 重新渲染
    let currentTrips = [];
    let currentResults = [];
    let currentRenderMode = 'card';
    let allDatesSet = new Set();

    // 關於彈窗
    const aboutModal = document.getElementById('aboutModal');
    document.getElementById('aboutBtn').addEventListener('click', () => aboutModal.classList.remove('hidden'));
    document.getElementById('closeAboutModal').addEventListener('click', () => aboutModal.classList.add('hidden'));
    aboutModal.addEventListener('click', (e) => { if (e.target === aboutModal) aboutModal.classList.add('hidden'); });

    // 進度條元素
    const loadingProgress = document.getElementById('loadingProgress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    if (!guid) {
        document.getElementById('weatherGrid').innerHTML = '<div style="background:#ffe0e0; padding:20px; border-radius:40px;">❌ 未提供專案編號，請從設定模式進入</div>';
        document.getElementById('projectTitleArea').innerText = '無專案';
    } else {
        loadProjectAndWeatherSequentially(guid);
    }

    // ----- 響應式偵測 -----
    function getRenderMode() {
        return window.innerWidth <= 768 ? 'card' : 'table';
    }

    function reRender() {
        if (!currentTrips.length) return;
        const newMode = getRenderMode();
        if (newMode !== currentRenderMode) {
            buildFullView(currentTrips, currentResults);
            currentRenderMode = newMode;
        }
    }

    // 防抖 resize
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            const newMode = getRenderMode();
            if (newMode !== currentRenderMode) {
                reRender();
            }
        }, 150);
    });

    // ----- 逐一載入天氣資料（修復版） -----
    async function loadProjectAndWeatherSequentially(projectId) {
        const grid = document.getElementById('weatherGrid');
        
        try {
            // 1. 先載入專案資料
            const projectRef = ref(db, `${PROJECTS_PATH}/${projectId}`);
            const snapshot = await get(projectRef);
            if (!snapshot.exists()) throw new Error("專案不存在");
            const project = { id: projectId, ...snapshot.val() };
            const trips = project.trips || [];
            
            document.getElementById('projectTitleArea').innerHTML = `📌 ${escapeHtml(project.name)} ｜ 共 ${trips.length} 個行程`;
            
            if (trips.length === 0) {
                grid.innerHTML = '<div class="empty-state">✨ 尚無行程，請先至設定模式添加</div>';
                return;
            }

            const sortedTrips = [...trips].sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
            currentTrips = sortedTrips;
            currentResults = new Array(sortedTrips.length).fill(null);
            currentRenderMode = getRenderMode();
            allDatesSet = new Set();
            
            // 2. 顯示進度條
            loadingProgress.classList.remove('hidden');
            progressFill.style.width = '0%';
            progressText.textContent = `準備載入 ${sortedTrips.length} 個行程...`;
            
            // 3. 渲染初始骨架屏
            renderInitialSkeletons(sortedTrips);
            
            // 4. 逐一載入每個行程的天氣
            for (let i = 0; i < sortedTrips.length; i++) {
                const trip = sortedTrips[i];
                
                // 更新進度
                const percent = Math.round((i / sortedTrips.length) * 100);
                progressFill.style.width = percent + '%';
                progressText.textContent = `正在載入 ${trip.location} (${i + 1}/${sortedTrips.length})...`;
                
                // 載入天氣資料
                const result = await fetchDetailedWeather(trip);
                currentResults[i] = result;
                
                // 蒐集日期
                if (result.daily) {
                    result.daily.forEach(d => allDatesSet.add(d.date));
                }
                
                // 更新進度
                const newPercent = Math.round(((i + 1) / sortedTrips.length) * 100);
                progressFill.style.width = newPercent + '%';
                
                // 即時更新視圖
                updateViewIncrementally(sortedTrips, currentResults, i);
            }
            
            // 5. 全部載入完成後，重建完整視圖確保一致性
            buildFullView(sortedTrips, currentResults);
            
            // 6. 載入完成提示
            progressText.textContent = `✅ 全部載入完成！共 ${sortedTrips.length} 個行程`;
            
            // 延遲隱藏進度條
            setTimeout(() => {
                loadingProgress.classList.add('hidden');
            }, 1500);
            
        } catch (err) {
            console.error(err);
            grid.innerHTML = `<div style="background:#ffe0e0; padding:20px; border-radius:40px;">⚠️ 載入失敗: ${err.message}</div>`;
            loadingProgress.classList.add('hidden');
        }
    }

    // ----- 初始骨架屏渲染 -----
    function renderInitialSkeletons(trips) {
        const grid = document.getElementById('weatherGrid');
        const mode = getRenderMode();
        
        if (mode === 'card') {
            grid.className = 'weather-grid';
            grid.innerHTML = trips.map((trip, i) => `
                <div class="weather-card loading-card" id="card-${i}">
                    <div class="card-header">
                        <div class="location-name">📍 ${escapeHtml(trip.location)}</div>
                        <div class="date-range">📅 ${trip.startDate} 至 ${trip.endDate}</div>
                    </div>
                    <div class="weather-content">
                        <div class="skeleton skeleton-line medium"></div>
                        <div class="skeleton skeleton-line short"></div>
                        <div class="skeleton skeleton-line medium" style="margin-top:16px;"></div>
                        <div class="skeleton skeleton-line short"></div>
                        <div class="skeleton skeleton-line medium"></div>
                        <div style="text-align:center; padding:20px; color:#8899bb;">⏳ 載入天氣資料中...</div>
                    </div>
                </div>
            `).join('');
        } else {
            // 表格模式的初始骨架屏
            renderTableSkeleton(trips);
        }
    }

    // ----- 表格骨架屏 -----
    function renderTableSkeleton(trips) {
        const grid = document.getElementById('weatherGrid');
        grid.className = '';

    // ----- 更新表格表頭 -----
    function updateTableHeader(dateColumns) {
        const headerRow = document.getElementById('tableHeaderRow');
        if (!headerRow) return;

        const placeholderTh = document.getElementById('placeholderTh');
        if (placeholderTh) {

        }

    // ----- 同步所有行的欄數 -----
    function syncAllRowsColumns(dateColumns) {
        const tbody = document.getElementById('tableTbody');
        if (!tbody) return;
        
        const rows = tbody.querySelectorAll('tr');
        const expectedCols = 1 + dateColumns.length;
        
        rows.forEach(row => {
            // 只處理已載入的行（非 loading-row）
            if (row.classList.contains('loading-row')) return;
            
            // 確保每行有 location + dateColumns 個 td
            const currentCols = row.children.length;
            
            if (currentCols < expectedCols) {
                // 需要補充空的 td
                for (let i = currentCols; i < expectedCols; i++) {
                    const td = document.createElement('td');
                    td.textContent = '—';
                    td.style.color = '#999';
                    row.appendChild(td);
                }
            }
        });
    }

    // ----- 著裝建議函數 -----
    function getOutfitSuggestion(highTemp, lowTemp, weatherCode, location) {
        const minTemp = parseFloat(lowTemp);
        const maxTemp = parseFloat(highTemp);
        
        const isRainy = [51, 53, 55, 61, 63, 65, 80, 81, 82, 95, 96, 99].includes(weatherCode);
        const isSnowy = [71, 73, 75].includes(weatherCode);
        
        const isSouth = location && (location.includes('上海') || location.includes('寧波') || 
                                     location.includes('宁波'));
        
        let outfit = '';
        let accessories = [];
        
        if (minTemp <= 0) {
            outfit = '🧥 厚羽絨服+毛衣';
            accessories = ['🧣圍巾', '🧤手套', '🧢毛帽'];
        } else if (minTemp <= 5) {
            outfit = '🧥 羽絨服/厚大衣';
            accessories = ['🧣圍巾', '🧤手套'];
        } else if (minTemp <= 10) {
            outfit = '🧥 大衣/風衣';
            accessories = ['🧣薄圍巾'];
        } else if (minTemp <= 15) {
            outfit = '👔 夾克/薄外套';
            if (isSouth) accessories.push('🌂備用雨具');
        } else if (minTemp <= 20) {
            outfit = '👕 長袖+薄外套';
            if (isSouth) accessories.push('🌂備用雨具');
        } else if (minTemp <= 25) {
            outfit = '👕 短袖+薄外套';
            accessories.push('☀️防曬');
        } else {
            outfit = '🩳 短袖短褲';
            accessories.push('☀️防曬', '🧴防曬乳');
        }
        
        if (isRainy) {
            accessories.push('☔ 雨具必備');
            if (minTemp < 15) accessories.push('💧防水鞋');
        }
        if (isSnowy) {
            accessories.push('❄️ 防滑鞋');
        }
        
        const tempDiff = maxTemp - minTemp;
        if (tempDiff > 12) {
            accessories.push('🌡️ 注意溫差');
        }
        
        const accStr = accessories.slice(0, 3).join(' ');
        
        return accStr ? `${outfit} ${accStr}` : outfit;
    }

    // ----- 表格水平滾動功能 -----
    function setupTableScroll(scrollContainerWrapper) {
        const scrollContainer = scrollContainerWrapper.querySelector('.table-wrapper');
        const leftArrow = scrollContainerWrapper.querySelector('.scroll-arrow-left');
        const rightArrow = scrollContainerWrapper.querySelector('.scroll-arrow-right');
        
        if (!scrollContainer || !leftArrow || !rightArrow) return;
        
        const scrollAmount = 250;
        
        function updateArrowStates() {
            const scrollLeft = scrollContainer.scrollLeft;
            const maxScrollLeft = scrollContainer.scrollWidth - scrollContainer.clientWidth;
            
            leftArrow.disabled = scrollLeft <= 0;
            leftArrow.style.opacity = scrollLeft <= 0 ? '0.3' : '1';
            
            rightArrow.disabled = scrollLeft >= maxScrollLeft - 1;
            rightArrow.style.opacity = scrollLeft >= maxScrollLeft - 1 ? '0.3' : '1';
        }
        
        leftArrow.addEventListener('click', () => {
            scrollContainer.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
        });
        
        rightArrow.addEventListener('click', () => {
            scrollContainer.scrollBy({ left: scrollAmount, behavior: 'smooth' });
        });
        
        scrollContainer.addEventListener('scroll', updateArrowStates);
        
        scrollContainer.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
                e.preventDefault();
                scrollContainer.scrollLeft += e.deltaX;
            }
        }, { passive: false });
        
        updateArrowStates();
        
        const observer = new MutationObserver(updateArrowStates);
        observer.observe(scrollContainer, { childList: true, subtree: true, characterData: true });
    }

    // ----- 地理編碼與天氣獲取 -----
    async function getCoordinates(locationName) {
        for (const [key, coords] of Object.entries(locationCoordinates)) {
            if (locationName.includes(key) || key.includes(locationName)) return coords;
        }
        try {
            const resp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(locationName)}&count=1&language=zh&format=json`);
            const data = await resp.json();
            if (data.results?.length) return { lat: data.results[0].latitude, lon: data.results[0].longitude };
        } catch {}
        try {
            const resp = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(locationName)}&format=json&limit=1`, { headers: { 'User-Agent': 'TravelWeatherApp/1.0' } });
            const data = await resp.json();
            if (data?.length) return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
        } catch {}
        return null;
    }

    function getWeatherDescription(code) {
        const map = {
            0:["晴","☀️"],1:["晴間多雲","🌤️"],2:["多雲","⛅"],3:["陰","☁️"],
            45:["霧","🌫️"],48:["霧凇","🌫️"],51:["毛毛雨","🌦️"],53:["毛毛雨","🌦️"],
            55:["毛毛雨","🌦️"],61:["小雨","🌧️"],63:["中雨","🌧️"],65:["大雨","🌧️"],
            71:["小雪","❄️"],73:["中雪","❄️"],75:["大雪","❄️"],80:["陣雨","🌦️"],
            81:["陣雨","🌦️"],82:["強陣雨","🌦️"],95:["雷暴","⛈️"],96:["雷暴伴冰雹","⛈️"],
            99:["強雷暴","⛈️"]
        };
        return map[code] || ["多雲","🌥️"];
    }

    function generateMockDaily(startDate, endDate, location) {
        const days = [];
        const start = new Date(startDate);
        const end = new Date(endDate);
        const climate = getClimateReference(location);
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
            const variation = Math.sin(d.getDate()) * 3;
            days.push({
                date: d.toISOString().slice(0,10),
                maxTemp: (climate.max + variation).toFixed(1),
                minTemp: (climate.min - variation).toFixed(1),
                weatherCode: 3, desc: climate.cond, icon: "📘", windSpeed: "12"
            });
        }
        return days;
    }

    async function fetchDetailedWeather(trip) {
        const { location, startDate, endDate } = trip;
        const coords = await getCoordinates(location);
        if (!coords) {
            return { error: true, message: "地點無法識別", daily: generateMockDaily(startDate, endDate, location), isClimate: true };
        }
        const today = new Date(); today.setHours(0,0,0,0);
        const limitDate = new Date(today); limitDate.setDate(today.getDate() + 16);
        const start = new Date(startDate), end = new Date(endDate);
        if (start > limitDate) return { daily: generateMockDaily(startDate, endDate, location), isClimate: true };
        
        const reqStart = start < today ? today.toISOString().slice(0,10) : startDate;
        const reqEnd = end > limitDate ? limitDate.toISOString().slice(0,10) : endDate;
        let apiDaily = [], isPartial = false;
        
        if (reqStart <= reqEnd) {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,wind_speed_10m_max&timezone=auto&start_date=${reqStart}&end_date=${reqEnd}`;
                const resp = await fetch(url);
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.daily?.time) {
                        data.daily.time.forEach((t, i) => {
                            const [desc, icon] = getWeatherDescription(data.daily.weather_code[i]);
                            apiDaily.push({
                                date: t,
                                maxTemp: data.daily.temperature_2m_max[i].toFixed(1),
                                minTemp: data.daily.temperature_2m_min[i].toFixed(1),
                                weatherCode: data.daily.weather_code[i],
                                windSpeed: data.daily.wind_speed_10m_max[i].toFixed(1),
                                desc, icon
                            });
                        });
                    }
                }
            } catch {}
        }
        
        const fullDaily = [];
        const cur = new Date(startDate);
        while (cur <= end) {
            const dateStr = cur.toISOString().slice(0,10);
            const apiEntry = apiDaily.find(d => d.date === dateStr);
            if (apiEntry) {
                apiEntry.outfit = getOutfitSuggestion(apiEntry.maxTemp, apiEntry.minTemp, apiEntry.weatherCode, location);
                fullDaily.push(apiEntry);
            } else {
                const mockDay = generateMockDaily(dateStr, dateStr, location)[0];
                mockDay.isMock = true;
                mockDay.outfit = getOutfitSuggestion(mockDay.maxTemp, mockDay.minTemp, mockDay.weatherCode, location);
                fullDaily.push(mockDay);
                isPartial = true;
            }
            cur.setDate(cur.getDate() + 1);
        }
        return { daily: fullDaily, isClimate: isPartial || start > limitDate };
    }

    function getClimateReference(location) {
        const mock = {
            "上海":{max:26,min:18,cond:"溫暖濕潤"},"七寶":{max:26,min:18,cond:"溫暖濕潤"},
            "瀋陽":{max:24,min:12,cond:"晴朗"},"哈爾濱":{max:22,min:10,cond:"多雲"},
            "寧波":{max:27,min:19,cond:"陣雨可能"}
        };
        for (let k in mock) if (location.includes(k)) return mock[k];
        return {max:24,min:14,cond:"氣候宜人"};
    }

            const result = results[tripIdx];
            if (!result) return;
            const daily = result.daily || [];
            const dailyMap = new Map();
            daily.forEach(d => dailyMap.set(d.date, d));
            
            const avgHigh = daily.length ? (daily.reduce((s,d)=>s+parseFloat(d.maxTemp),0)/daily.length).toFixed(1) : '--';
            const avgLow = daily.length ? (daily.reduce((s,d)=>s+parseFloat(d.minTemp),0)/daily.length).toFixed(1) : '--';
            
            const tr = document.createElement('tr');
            
            const tdLocation = document.createElement('td');
            tdLocation.innerHTML = `
                <div class="location-info">
                    <span class="location-name">${escapeHtml(trip.location)}</span>
                    <span class="trip-meta">📅 ${trip.startDate} ~ ${trip.endDate}</span>
                    <span class="avg-temp">🌡️ ${avgHigh}° / ${avgLow}°</span>
                </div>
            `;
            tr.appendChild(tdLocation);
            
            dateColumns.forEach(dateStr => {
                const td = document.createElement('td');
                const dayData = dailyMap.get(dateStr);
                
                if (!dayData) {
                    td.textContent = '—';
                    td.style.color = '#999';
                } else {
                    const icon = dayData.icon || getWeatherDescription(dayData.weatherCode)[1];
                    const desc = dayData.desc || getWeatherDescription(dayData.weatherCode)[0];
                    const isMock = dayData.isMock || result.isClimate;
                    const outfit = dayData.outfit || getOutfitSuggestion(dayData.maxTemp, dayData.minTemp, dayData.weatherCode, trip.location);
                    
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell-content';
                    cellDiv.innerHTML = `
                        <span class="cell-icon">${icon}</span>
                        <span class="cell-temp">
                            <span class="high">${Math.round(dayData.maxTemp)}°</span>
                            <span class="low">${Math.round(dayData.minTemp)}°</span>
                        </span>
                        <span class="cell-desc">${desc}</span>
                        <span class="cell-outfit" title="著裝建議">👗 ${outfit}</span>
                        ${isMock ? '<span class="mock-badge">📘 參考</span>' : ''}
                    `;
                    td.appendChild(cellDiv);
                    if (result.error) {
                        td.style.background = '#ffe0e0';
                        td.title = result.message;
                    }
                }
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        wrapper.appendChild(table);
        
        const rightArrow = document.createElement('button');
        rightArrow.className = 'scroll-arrow scroll-arrow-right';
        rightArrow.innerHTML = '▶';
        rightArrow.title = '向右滾動';
        
        scrollContainerWrapper.appendChild(leftArrow);
        scrollContainerWrapper.appendChild(wrapper);
        scrollContainerWrapper.appendChild(rightArrow);
        
        grid.appendChild(scrollContainerWrapper);
        
        const hasClimateNote = results.some(r => r && r.isClimate);
        if (hasClimateNote) {
            const note = document.createElement('div');
            note.className = 'info-note';
            note.innerHTML = '📘 標示「參考」為歷史氣候模擬資料，實際預報將於接近日期更新。<br>👗 著裝建議根據當日高低溫及天氣狀況自動生成，僅供參考。';
            grid.appendChild(note);
        }
        
        setupTableScroll(scrollContainerWrapper);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }
</script>
</body>
</html>
